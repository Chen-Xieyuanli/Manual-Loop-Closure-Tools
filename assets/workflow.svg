<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="420" rx="24" fill="#F8FAFC"/>
  <text x="52" y="58" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="800">Typical workflow</text>
  <text x="52" y="90" fill="#475569" font-family="Arial, sans-serif" font-size="18">Open a session, verify a closure, manage graph changes, and export a clean optimized result.</text>

  <g font-family="Arial, sans-serif">
    <rect x="52" y="142" width="206" height="194" rx="22" fill="#EFF6FF" stroke="#BFDBFE"/>
    <circle cx="94" cy="188" r="24" fill="#1D4ED8"/>
    <text x="87" y="196" fill="white" font-size="20" font-weight="800">1</text>
    <text x="130" y="190" fill="#1E3A8A" font-size="22" font-weight="800">Load Session</text>
    <text x="74" y="232" fill="#334155" font-size="17">• Resolve g2o / TUM / keyframes</text>
    <text x="74" y="260" fill="#334155" font-size="17">• Validate IDs and point clouds</text>
    <text x="74" y="288" fill="#334155" font-size="17">• Start from Original / Working view</text>

    <rect x="294" y="142" width="206" height="194" rx="22" fill="#ECFDF5" stroke="#86EFAC"/>
    <circle cx="336" cy="188" r="24" fill="#16A34A"/>
    <text x="329" y="196" fill="white" font-size="20" font-weight="800">2</text>
    <text x="372" y="190" fill="#166534" font-size="22" font-weight="800">Inspect & Match</text>
    <text x="316" y="232" fill="#334155" font-size="17">• Pick nodes or an existing loop</text>
    <text x="316" y="260" fill="#334155" font-size="17">• Adjust source pose visually</text>
    <text x="316" y="288" fill="#334155" font-size="17">• Run GICP / Auto Yaw Sweep</text>

    <rect x="536" y="142" width="206" height="194" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
    <circle cx="578" cy="188" r="24" fill="#EA580C"/>
    <text x="571" y="196" fill="white" font-size="20" font-weight="800">3</text>
    <text x="614" y="190" fill="#9A3412" font-size="22" font-weight="800">Edit Graph</text>
    <text x="558" y="232" fill="#334155" font-size="17">• Add manual edge</text>
    <text x="558" y="260" fill="#334155" font-size="17">• Replace a weak existing loop</text>
    <text x="558" y="288" fill="#334155" font-size="17">• Track changes and undo safely</text>

    <rect x="778" y="142" width="206" height="194" rx="22" fill="#F5F3FF" stroke="#C4B5FD"/>
    <circle cx="820" cy="188" r="24" fill="#7C3AED"/>
    <text x="813" y="196" fill="white" font-size="20" font-weight="800">4</text>
    <text x="856" y="190" fill="#5B21B6" font-size="22" font-weight="800">Optimize</text>
    <text x="800" y="232" fill="#334155" font-size="17">• Solve a new working graph</text>
    <text x="800" y="260" fill="#334155" font-size="17">• Update trajectory and constraints</text>
    <text x="800" y="288" fill="#334155" font-size="17">• Iterate if more loops are needed</text>

    <rect x="1020" y="142" width="206" height="194" rx="22" fill="#F0F9FF" stroke="#7DD3FC"/>
    <circle cx="1062" cy="188" r="24" fill="#0284C7"/>
    <text x="1055" y="196" fill="white" font-size="20" font-weight="800">5</text>
    <text x="1098" y="190" fill="#0C4A6E" font-size="22" font-weight="800">Export</text>
    <text x="1042" y="232" fill="#334155" font-size="17">• g2o / TUM / report</text>
    <text x="1042" y="260" fill="#334155" font-size="17">• global_map_manual_imu.pcd</text>
    <text x="1042" y="288" fill="#334155" font-size="17">• trajectory.pcd and figure outputs</text>
  </g>

  <path d="M260 238H290" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M502 238H532" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M744 238H774" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
  <path d="M986 238H1016" stroke="#94A3B8" stroke-width="6" stroke-linecap="round"/>
</svg>
